services:
  aegis:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5555:5555"
    env_file: .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5555/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
