services:
  aegis:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "${WEB_PORT:-5555}:5555"
    restart: unless-stopped
    env_file: .env
    volumes:
      - ${DATA_DIR:-./data}:/app/data
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:5555/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s
