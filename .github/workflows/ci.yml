name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @aegis/shared build

      - name: Typecheck api (build + test configs)
        run: pnpm --filter @aegis/api lint

      - name: Typecheck web
        run: pnpm --filter @aegis/web lint

      - name: Run api test suite
        run: pnpm --filter @aegis/api test
